<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tecnoteca - Encuesta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../index.css">
  <script src="page-theme.js" defer></script>
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
    
    // Configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAnx7Wn7pZ05tx7OiLK9OdAu-o18PcKaq0",
      authDomain: "tecnoteca-a2e4a.firebaseapp.com",
      databaseURL: "https://tecnoteca-a2e4a-default-rtdb.firebaseio.com",
      projectId: "tecnoteca-a2e4a",
      storageBucket: "tecnoteca-a2e4a.firebasestorage.app",
      messagingSenderId: "1043608696832",
      appId: "1:1043608696832:web:da52be884a9684a2e980e5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    window.db = db;
    window.push = push;
    window.ref = ref;
  </script>
</head>
<body class="survey-page">
  <div class="floating-logos" aria-hidden="true">
    <img class="floating-logo logo-shape logo-f1" src="../images/tec.png" alt="">
    <img class="floating-logo logo-textmark logo-f2" src="../images/educ.png" alt="">
    <img class="floating-logo logo-shape logo-f3" src="../images/tec.png" alt="">
    <img class="floating-logo logo-textmark logo-f4" src="../images/educ.png" alt="">
    <img class="floating-logo logo-shape logo-f5" src="../images/tec.png" alt="">
    <img class="floating-logo logo-textmark logo-f6" src="../images/educ.png" alt="">
  </div>

  <div class="floating-squares" aria-hidden="true">
    <div class="square-logo sq-1"><img src="../images/tec.png" alt=""></div>
    <div class="square-logo sq-2"><img src="../images/educ.png" alt=""></div>
  </div>

  <main class="app-shell subpage-shell demo-shell">
    <section class="panel demo-panel survey-demo">
      <div class="demo-top">
        <a class="btn btn-soft back-home-btn" href="../index.html">Volver al inicio</a>
        <span class="demo-user">Jugador: <strong id="playerLabel">Sin nombre</strong></span>
      </div>

      <h1 class="hero-title demo-title">Ayudanos a mejorar</h1>

      <!-- ✅ FORM CON FIREBASE -->
      <form 
        id="demoSurveyForm"
        class="demo-form"
      >

        <label>
          ¿Como fue tu visita?
          <select name="visita" required>
            <option value="" selected disabled>Selecciona una opcion</option>
            <option value="Excelente">Excelente</option>
            <option value="Buena">Buena</option>
            <option value="Regular">Regular</option>
            <option value="Mejorable">Mejorable</option>
          </select>
        </label>

        <label>
          ¿Que te gusto mas?
          <select name="gusto" required>
            <option value="" selected disabled>Selecciona una opcion</option>
            <option value="Zona de tecnologia">Zona de tecnologia</option>
            <option value="Zona de lectura">Zona de lectura</option>
            <option value="Talleres">Talleres</option>
            <option value="Juegos">Juegos</option>
          </select>
        </label>

        <label>
          Comentarios
          <textarea name="comentarios" rows="4" placeholder="Escribe una sugerencia..."></textarea>
        </label>

        <div class="demo-actions">
          <button class="btn btn-primary" type="submit">ENVIAR</button>
        </div>

      </form>

      <p id="surveyFeedback" class="demo-feedback">
        Completa el formulario para ver el mensaje de envio.
      </p>

    </section>
  </main>

  <!-- ✅ JAVASCRIPT CON REALTIME DATABASE -->
  <script>
    const player = localStorage.getItem("tecnotecaPlayerName") || "Sin nombre";
    document.getElementById("playerLabel").textContent = player;

    const form = document.getElementById("demoSurveyForm");
    const feedback = document.getElementById("surveyFeedback");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      feedback.textContent = "Enviando respuestas...";

      try {
        // Obtener datos del formulario
        const encuestaData = {
          jugador: player,
          visita: form.querySelector('select[name="visita"]').value,
          gusto: form.querySelector('select[name="gusto"]').value,
          comentarios: form.querySelector('textarea[name="comentarios"]').value,
          fecha: new Date().toISOString(),
          timestamp: Date.now()
        };

        // Guardar en Realtime Database
        await window.push(window.ref(window.db, "encuestas"), encuestaData);

        feedback.textContent = "✅ ¡Gracias por tu respuesta! Volviendo al inicio...";
        form.reset();

        setTimeout(() => {
          window.location.href = "../index.html";
        }, 1500);
      } catch (error) {
        console.error("Error al guardar:", error);
        feedback.textContent = "❌ Error al enviar. Intenta de nuevo.";
        feedback.style.color = "red";
      }
    });
  </script>

</body>
</html>
